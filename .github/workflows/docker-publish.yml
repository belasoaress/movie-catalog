name: Publicar imagem do Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Fazer login docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fazer imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/belasoaress/movie-catalog:latest
